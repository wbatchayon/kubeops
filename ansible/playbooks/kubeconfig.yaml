---
# Kubeconfig distribution playbook
# Distributes kubeconfig from control plane to other nodes

- name: Distribute kubeconfig
  hosts: control_plane
  become: true
  gather_facts: true

  tasks:
    - name: Check if kubeconfig exists
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeconfig_stat

    - name: Read kubeconfig
      ansible.builtin.slurp:
        src: /etc/kubernetes/admin.conf
      register: kubeconfig_content
      when: kubeconfig_stat.stat.exists

    - name: Create .kube directory for root
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        owner: root
        group: root
        mode: '0700'
      when: kubeconfig_stat.stat.exists

    - name: Copy kubeconfig to root
      ansible.builtin.copy:
        content: "{{ kubeconfig_content.content | b64decode }}"
        dest: /root/.kube/config
        owner: root
        group: root
        mode: '0600'
      when: kubeconfig_stat.stat.exists

- name: Join worker nodes
  hosts: worker
  become: true
  gather_facts: true
  vars:
    # Token will be generated on control plane
    kubeadm_token: ""
    ca_cert_hash: ""
    control_plane_ip: ""

  tasks:
    - name: Check if node is already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Generate kubeadm join command (on control plane)
      ansible.builtin.shell: |
        kubeadm token list | grep -v TOKEN | head -1 | awk '{print $1}'
      register: token_result
      delegate_to: "{{ groups['control_plane'][0] }}"
      when: not kubelet_conf.stat.exists

    - name: Get CA cert hash
      ansible.builtin.shell:
        cmd: |
          openssl x509 -pubkey -in /etc/kubernetes/pki/ca.crt |
            openssl rsa -pubin -outform der 2>/dev/null |
            openssl dgst -sha256 -hex | sed 's/^.* //'
      register: ca_cert_result
      delegate_to: "{{ groups['control_plane'][0] }}"
      when: not kubelet_conf.stat.exists

    - name: Join worker node to cluster
      ansible.builtin.command: >
        kubeadm join {{ hostvars[groups['control_plane'][0]]['ansible_host'] }}:6443
          --token {{ hostvars[groups['control_plane'][0]]['token_result'].stdout }}
          --discovery-token-ca-cert-hash sha256:{{ hostvars[groups['control_plane'][0]]['ca_cert_result'].stdout }}
      when: not kubelet_conf.stat.exists
      register: join_result
      failed_when: join_result.rc != 0 and 'already joined' not in join_result.stdout

    - name: Enable kubelet service
      ansible.builtin.systemd:
        name: kubelet
        state: started
        enabled: true
      when: not kubelet_conf.stat.exists
