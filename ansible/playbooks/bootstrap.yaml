---
# Bootstrap playbook for Kubernetes cluster nodes
# This playbook prepares all nodes for Kubernetes installation

- name: Bootstrap Kubernetes Nodes
  hosts: all
  become: true
  gather_facts: true
  vars:
    # Kubernetes version to install
    kubernetes_version: "1.28.0"

    # Container runtime
    container_runtime: "containerd"

    # Network settings
    pod_network_cidr: "10.244.0.0/16"
    service_cidr: "10.96.0.0/16"
    cluster_domain: "cluster.local"

    # Kernel modules to load
    kernel_modules:
      - overlay
      - br_netfilter

    # Sysctl parameters
    sysctl_params:
      net.ipv4.ip_forward: "1"
      net.bridge.bridge-nf-call-iptables: "1"
      net.bridge.bridge-nf-call-ip6tables: "1"
      net.ipv4.conf.all.forwarding: "1"
      net.ipv4.conf.default.forwarding: "1"
      net.ipv4.conf.all.rp_filter: "0"
      net.ipv4.conf.default.rp_filter: "0"
      net.ipv4.conf.all.accept_redirects: "0"
      net.ipv4.conf.default.accept_redirects: "0"
      net.ipv4.conf.all.send_redirects: "0"
      net.ipv4.conf.default.send_redirects: "0"
      net.ipv4.conf.all.accept_source_route: "0"
      net.ipv4.conf.default.accept_source_route: "0"
      net.ipv6.conf.all.accept_redirects: "0"
      net.ipv6.conf.default.accept_redirects: "0"
      net.ipv6.conf.all.accept_source_route: "0"
      net.ipv6.conf.default.accept_source_route: "0"

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      changed_when: false
      when: ansible_os_family == "Debian"

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
      failed_when: false
      changed_when: false

  tasks:
    # Common tasks for all nodes
    - name: Include common role
      ansible.builtin.import_role:
        name: common

    # Container runtime tasks
    - name: Include containerd role
      ansible.builtin.import_role:
        name: containerd

    # Kubernetes components
    - name: Include kubeadm role
      ansible.builtin.import_role:
        name: kubeadm

  post_tasks:
    - name: Verify kubeadm is installed
      ansible.builtin.command: kubeadm version
      register: kubeadm_version
      changed_when: false
      failed_when: false

    - name: Display kubeadm version
      ansible.builtin.debug:
        msg: "kubeadm version: {{ kubeadm_version.stdout }}"

    - name: Verify containerd is running
      ansible.builtin.systemd:
        name: containerd
        state: started
        enabled: true

    - name: Display node information
      ansible.builtin.debug:
        msg: |
          Node: {{ inventory_hostname }}
          Role: {{ kubernetes_role | default('worker') }}
          IP: {{ ansible_host }}
